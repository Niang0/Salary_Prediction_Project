name: Python CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest joblib scikit-learn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # --- CORRIGÉ : On crée directement le dossier et un faux modèle via Python en une ligne ---
      - name: Generate dummy pkl file for testing
        run: |
          python -c "import os, joblib; from sklearn.linear_model import LinearRegression; os.makedirs('models', exist_ok=True); model = LinearRegression(); model.fit([[30, 5, 1, 0, 0]], [500000]); joblib.dump(model, 'models/salary_model.pkl')"

      - name: Run unit tests with pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          DATABASE_PORT: "5432"
          DATABASE_HOST: "localhost"
        run: |
          PYTHONPATH=. pytest
