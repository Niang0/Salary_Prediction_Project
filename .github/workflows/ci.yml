name: Python CI Pipeline

# Déclencheurs : Le pipeline se lance à chaque push ou pull request sur la branche main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code du dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer l'environnement Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Mettre en cache les dépendances pour accélérer les futurs builds
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Installer les dépendances du projet, Flake8 et Pytest
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 5. Étape de Linting : Vérification du respect de la syntaxe Python (PEP 8)
      - name: Lint with flake8
        run: |
          # Arrête le build s'il y a des erreurs de syntaxe Python ou des symboles indéfinis
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avertissements de style (optionnel, n'arrête pas le build)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 6. Étape intermédiaire : Exécuter le pipeline d'entraînement pour générer le modèle pkl
      - name: Train model to generate pkl file
        run: |
          PYTHONPATH=. python main.py

      # 7. Étape de Tests : Lancement des tests unitaires avec Pytest
      - name: Run unit tests with pytest
        run: |
          PYTHONPATH=. pytest
